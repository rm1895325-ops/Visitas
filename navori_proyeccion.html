<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visitas del día</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #7aafd4;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: clamp(30px, 5vw, 80px);
  }

  .title {
    font-size: clamp(28px, 4vw, 60px);
    font-weight: bold;
    color: #000;
    margin-bottom: clamp(10px, 2vw, 30px);
  }

  .date {
    font-size: clamp(16px, 2vw, 32px);
    color: #000;
    margin-bottom: clamp(24px, 4vw, 60px);
  }

  .visit-list {
    display: flex;
    flex-direction: column;
    gap: clamp(12px, 2vw, 28px);
    flex: 1;
  }

  .visit-row {
    font-size: clamp(22px, 3.5vw, 54px);
    color: #000;
    font-weight: 500;
  }

  .visit-row .time {
    font-weight: bold;
    margin-right: 16px;
  }

  .visit-row .company {
    font-size: clamp(16px, 2.5vw, 38px);
    font-weight: normal;
    margin-left: 12px;
    opacity: 0.75;
  }

  .empty {
    font-size: clamp(20px, 3vw, 46px);
    color: #000;
    opacity: 0.6;
    margin-top: 40px;
  }

  .footer {
    font-size: clamp(11px, 1vw, 16px);
    color: #000;
    opacity: 0.45;
    margin-top: auto;
    padding-top: 20px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="title">Visitas del día</div>
  <div class="date" id="date-label"></div>
  <div class="visit-list" id="visit-list"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwqB_-icdBR84lgj8dH1mHtvRVft4aUDwfJNDrDNkIQ_AejKvQc9jM7gFnIBsaAy2Zf/exec";
  const REFRESH = 60 * 1000;

  const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function normalizeDate(val) {
    if (!val) return '';
    // Si viene como objeto Date de Google Sheets
    if (val instanceof Date) {
      return `${val.getFullYear()}-${String(val.getMonth()+1).padStart(2,'0')}-${String(val.getDate()).padStart(2,'0')}`;
    }
    const str = String(val).trim();
    // DD/MM/YYYY
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
      const [d,m,y] = str.split('/');
      return `${y}-${m}-${d}`;
    }
    // Google a veces devuelve "Date(2026,3,28)" 
    const gMatch = str.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (gMatch) {
      const y = gMatch[1], m = String(parseInt(gMatch[2])+1).padStart(2,'0'), d = String(gMatch[3]).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }
    return str;
  }

  function updateDate() {
    const now = new Date();
    document.getElementById('date-label').textContent =
      `${DAYS[now.getDay()]}, ${now.getDate()} de ${MONTHS[now.getMonth()]} de ${now.getFullYear()}`;
  }

  function renderVisits(rows) {
    const t = todayStr();
    const today = rows
      .filter(v => normalizeDate(v.fecha) === t)
      .sort((a,b) => (String(a.hora||'')).localeCompare(String(b.hora||'')));

    const el = document.getElementById('visit-list');

    if (!today.length) {
      el.innerHTML = '<div class="empty">No hay visitas programadas para hoy.</div>';
      return;
    }

    el.innerHTML = today.map(v => `
      <div class="visit-row">
        ${v.hora ? `<span class="time">${v.hora}</span>` : ''}
        <span>${v.nombre}</span>
        ${v.empresa ? `<span class="company">— ${v.empresa}</span>` : ''}
      </div>
    `).join('');
  }

  async function fetchAndRender() {
    try {
      const res  = await fetch(API_URL + '?t=' + Date.now());
      const data = await res.json();
      renderVisits(data);
      const now = new Date();
      document.getElementById('footer').textContent =
        `Actualizado: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    } catch(e) {
      document.getElementById('footer').textContent = 'Error al cargar datos. Reintentando...';
    }
  }

  updateDate();
  fetchAndRender();
  setInterval(fetchAndRender, REFRESH);
</script>
</body>
</html>
