<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visitas del día</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #7aafd4;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: clamp(30px, 5vw, 80px);
  }

  .title {
    font-size: clamp(28px, 4vw, 60px);
    font-weight: bold;
    color: #000;
    margin-bottom: clamp(10px, 2vw, 30px);
  }

  .date {
    font-size: clamp(16px, 2vw, 32px);
    color: #000;
    margin-bottom: clamp(24px, 4vw, 60px);
  }

  .visit-list {
    display: flex;
    flex-direction: column;
    gap: clamp(12px, 2vw, 28px);
    flex: 1;
  }

  .visit-row {
    font-size: clamp(22px, 3.5vw, 54px);
    color: #000;
    font-weight: 500;
  }

  .visit-row .time {
    font-weight: bold;
    margin-right: 16px;
  }

  .visit-row .company {
    font-size: clamp(16px, 2.5vw, 38px);
    font-weight: normal;
    margin-left: 12px;
    opacity: 0.75;
  }

  .empty {
    font-size: clamp(20px, 3vw, 46px);
    color: #000;
    opacity: 0.6;
    margin-top: 40px;
  }

  .footer {
    font-size: clamp(11px, 1vw, 16px);
    color: #000;
    opacity: 0.45;
    margin-top: auto;
    padding-top: 20px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="title">Visitas del día</div>
  <div class="date" id="date-label"></div>
  <div class="visit-list" id="visit-list"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzlo-NdKTwEJO2f2NeW3U7I_VjhdTc8eLWCRIdoeNZLfCgE_09S0PztYyV4Peh7uXYt/exec";
  const REFRESH = 60 * 1000;

  const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Convierte cualquier formato de fecha a YYYY-MM-DD
  function normalizeDate(val) {
    if (!val) return '';
    const str = String(val).trim();
    // Ya está en YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
    // DD/MM/YYYY
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
      const [d,m,y] = str.split('/');
      return `${y}-${m}-${d}`;
    }
    // Formato largo: "Tue Apr 28 2026 00:00:00 GMT+0200..."
    const d = new Date(str);
    if (!isNaN(d.getTime())) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    return str;
  }

  // Convierte hora larga a HH:MM
  function normalizeHora(val) {
    if (!val) return '';
    const str = String(val).trim();
    // Ya está en HH:MM
    if (/^\d{1,2}:\d{2}$/.test(str)) return str;
    // Formato largo: "Sat Dec 30 1899 10:00:00 GMT..."
    const d = new Date(str);
    if (!isNaN(d.getTime())) {
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    return str;
  }

  function updateDate() {
    const now = new Date();
    document.getElementById('date-label').textContent =
      `${DAYS[now.getDay()]}, ${now.getDate()} de ${MONTHS[now.getMonth()]} de ${now.getFullYear()}`;
  }

  function renderVisits(rows) {
    const t = todayStr();

    const today = rows
      .filter(v => normalizeDate(v.Fecha || v.fecha) === t)
      .sort((a, b) => normalizeHora(a.Hora || a.hora).localeCompare(normalizeHora(b.Hora || b.hora)));

    const el = document.getElementById('visit-list');

    if (!today.length) {
      el.innerHTML = '<div class="empty">No hay visitas programadas para hoy.</div>';
      return;
    }

    el.innerHTML = today.map(v => {
      const nombre  = v.Nombre  || v.nombre  || '';
      const empresa = v.Empresa || v.empresa || '';
      const hora    = normalizeHora(v.Hora || v.hora || '');
      return `
        <div class="visit-row">
          ${hora ? `<span class="time">${hora}</span>` : ''}
          <span>${nombre}</span>
          ${empresa ? `<span class="company">— ${empresa}</span>` : ''}
        </div>
      `;
    }).join('');
  }

  async function fetchAndRender() {
    try {
      const res  = await fetch(API_URL + '?t=' + Date.now());
      const data = await res.json();
      renderVisits(data);
      const now = new Date();
      document.getElementById('footer').textContent =
        `Actualizado: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    } catch(e) {
      document.getElementById('footer').textContent = 'Error al cargar datos. Reintentando...';
    }
  }

  updateDate();
  fetchAndRender();
  setInterval(fetchAndRender, REFRESH);
</script>
</body>
</html>
